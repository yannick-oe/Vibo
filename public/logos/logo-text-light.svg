<svg viewBox="-15.2 -5.2 547.7 253.5" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vibo">
<g id="all">
<svg x="14" y="24" width="192" height="192" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B6BFF"/><stop offset="0.5" stop-color="#A24BF0"/><stop offset="1" stop-color="#FF2E9A"/>
    </linearGradient>
    <radialGradient id="space" cx="0.5" cy="0.38" r="0.95">
      <stop offset="0" stop-color="#3E2090"/><stop offset="0.5" stop-color="#1B0C52"/><stop offset="1" stop-color="#090320"/>
    </radialGradient>
    <linearGradient id="bladeL" x1="0" y1="0.1" x2="0.7" y2="1">
      <stop offset="0" stop-color="#7C8CFF"/><stop offset="1" stop-color="#A9A0FF"/>
    </linearGradient>
    <linearGradient id="bladeR" x1="1" y1="0.1" x2="0.3" y2="1">
      <stop offset="0" stop-color="#FF3D9E"/><stop offset="1" stop-color="#FF86C2"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="0.3" stop-color="#FFC6E6"/><stop offset="1" stop-color="#FF2E9A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flare" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6FC0" stop-opacity="0"/><stop offset="0.5" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FF6FC0" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="coreglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigblur" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="midblur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8"/></filter>
    <clipPath id="card"><rect x="40" y="40" width="432" height="432" rx="116"/></clipPath>
  </defs>

  <rect x="40" y="40" width="432" height="432" rx="116" fill="url(#border)" filter="url(#bigblur)" opacity="0.55"/>

  <g clip-path="url(#card)">
    <rect x="40" y="40" width="432" height="432" fill="url(#space)"/>
    <circle cx="120" cy="120" r="150" fill="#3A5BFF" opacity="0.22" filter="url(#bigblur)"/>
    <circle cx="395" cy="380" r="170" fill="#FF2E9A" opacity="0.28" filter="url(#bigblur)"/>
    <circle cx="300" cy="430" r="120" fill="#7A2BE0" opacity="0.30" filter="url(#bigblur)"/>
    <g fill="#FFFFFF">
      <circle cx="118" cy="108" r="2.3" opacity="0.9"/><circle cx="300" cy="92" r="1.6" opacity="0.7"/>
      <circle cx="362" cy="150" r="2.4" opacity="0.85"/><circle cx="410" cy="214" r="1.5" opacity="0.6"/>
      <circle cx="92" cy="250" r="1.8" opacity="0.75"/><circle cx="150" cy="318" r="1.4" opacity="0.6"/>
      <circle cx="414" cy="318" r="2.0" opacity="0.8"/><circle cx="250" cy="124" r="1.3" opacity="0.55"/>
      <circle cx="188" cy="186" r="1.6" opacity="0.7"/><circle cx="330" cy="262" r="1.4" opacity="0.6"/>
      <circle cx="108" cy="178" r="1.5" opacity="0.65"/><circle cx="398" cy="112" r="1.7" opacity="0.7"/>
    </g>

    <!-- colored crescents (slim) with outer glow -->
    <g filter="url(#glow)">
      <path d="M196 150 C156 220 176 316 256 360 C228 308 222 240 214 168 Z" fill="url(#bladeL)"/>
      <path d="M316 150 C356 220 336 316 256 360 C284 308 290 240 298 168 Z" fill="url(#bladeR)"/>
    </g>
    <!-- white hot core spines -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round" filter="url(#coreglow)">
      <path d="M210 172 C188 246 206 318 252 352" stroke-width="9" opacity="0.95"/>
      <path d="M302 172 C324 246 306 318 260 352" stroke-width="9" opacity="0.95"/>
    </g>

    <!-- lens-flare spark -->
    <ellipse cx="256" cy="360" rx="184" ry="6" fill="url(#flare)" opacity="0.85" filter="url(#midblur)"/>
    <circle cx="256" cy="360" r="76" fill="url(#spark)"/>
    <g stroke="#FFFFFF" stroke-linecap="round">
      <line x1="256" y1="360" x2="256" y2="296" stroke-width="3" opacity="0.9"/>
      <line x1="256" y1="360" x2="256" y2="424" stroke-width="3" opacity="0.9"/>
      <line x1="256" y1="360" x2="194" y2="360" stroke-width="2.4" opacity="0.85"/>
      <line x1="256" y1="360" x2="318" y2="360" stroke-width="2.4" opacity="0.85"/>
    </g>
    <circle cx="256" cy="360" r="7.5" fill="#FFFFFF"/>
  </g>

  <rect x="40" y="40" width="432" height="432" rx="116" fill="none" stroke="url(#border)" stroke-width="11" filter="url(#glow)"/>
</svg>
<text id="wm" x="226" y="120" font-family="Nunito, 'Trebuchet MS', sans-serif" font-weight="800" font-size="138" letter-spacing="-2" dominant-baseline="central" fill="#FFFFFF">Vibo</text>
</g>
</svg>