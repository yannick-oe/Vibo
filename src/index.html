<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Vibo – Team-Chat mit Channels, Threads und Reaktionen</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Vibo – Team-Chat mit Channels, Direktnachrichten, Threads und Reaktionen.">
  <link rel="canonical" href="https://vibo.yannick-oetelshoven.at/">
  <!-- theme-color mirrors the 'bg' color token of each theme (src/styles/_variables.scss) -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eceefe">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0626">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Vibo">
  <meta property="og:title" content="Vibo – Team-Chat mit Channels, Threads und Reaktionen">
  <meta property="og:description" content="Vibo – Team-Chat mit Channels, Direktnachrichten, Threads und Reaktionen.">
  <meta property="og:url" content="https://vibo.yannick-oetelshoven.at/">
  <meta property="og:locale" content="de_DE">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="pwa-icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://vibo-2ba80.firebaseapp.com">
  <link rel="preconnect" href="https://apis.google.com">
  <link rel="preload" href="fonts/Inter-Variable.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: 'Inter';
      src: url('fonts/Inter-Variable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Inter';
      src: url('fonts/Inter-Italic-Variable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'Nunito';
      src: url('fonts/Nunito-Variable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('vibo:theme');
        var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
