<form class="password-change" [formGroup]="form" (ngSubmit)="submit()">
  <div class="form-field">
    <label class="sr-only" for="settings-password-current">Aktuelles Passwort</label>
    <app-password-input
      inputId="settings-password-current"
      formControlName="current"
      placeholder="Aktuelles Passwort"
      autocomplete="current-password"
      describedBy="settings-password-current-error"
      [isInvalid]="isInvalid('current')"
    />
    <p class="form-error" id="settings-password-current-error" aria-live="polite">
      {{ errorMessage('current') }}
    </p>
  </div>

  <div class="form-field">
    <label class="sr-only" for="settings-password-new">Neues Passwort</label>
    <app-password-input
      inputId="settings-password-new"
      formControlName="next"
      placeholder="Neues Passwort"
      autocomplete="new-password"
      describedBy="settings-password-new-error"
      [isInvalid]="isInvalid('next')"
    />
    <p class="form-error" id="settings-password-new-error" aria-live="polite">
      {{ errorMessage('next') }}
    </p>
  </div>

  <div class="form-field">
    <label class="sr-only" for="settings-password-confirm">Neues Passwort wiederholen</label>
    <app-password-input
      inputId="settings-password-confirm"
      formControlName="confirm"
      placeholder="Neues Passwort wiederholen"
      autocomplete="new-password"
      describedBy="settings-password-confirm-error"
      [isInvalid]="isInvalid('confirm')"
    />
    <p class="form-error" id="settings-password-confirm-error" aria-live="polite">
      {{ errorMessage('confirm') }}
    </p>
  </div>

  <div class="password-change__actions">
    <p class="password-change__status" aria-live="polite" role="status">
      @if (generalError()) {
        <span class="password-change__status-error">{{ generalError() }}</span>
      }
    </p>
    <button class="btn btn-primary" type="submit" [disabled]="form.invalid || isPending()">
      Passwort ändern
    </button>
  </div>
</form>
