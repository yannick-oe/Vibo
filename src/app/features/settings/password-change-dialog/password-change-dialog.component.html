<app-dialog-shell
  size="settings"
  labelledBy="password-change-dialog-title"
  (closed)="closed.emit()"
>
  <header class="password-change-dialog__head">
    <h2 class="password-change-dialog__title" id="password-change-dialog-title">Passwort ändern</h2>
    <button class="btn btn-icon btn-sm" type="button" aria-label="Dialog schließen" (click)="closed.emit()">
      <img src="app-icons/close.svg" alt="" aria-hidden="true" />
    </button>
  </header>

  <app-password-change />
</app-dialog-shell>
