<section class="auth-card register-card">
  <header class="auth-card__head">
    <a class="btn btn-icon" routerLink="/auth/login" aria-label="Zurück zur Anmeldung">
      <img src="app-icons/arrow-left.svg" alt="" aria-hidden="true" />
    </a>
    <h1 #title class="register-card__title" tabindex="-1">Konto erstellen</h1>
  </header>

  <p class="register-card__intro">
    Mit deinem Benutzernamen und deiner E-Mail-Adresse hast du dein neues {{ appName }}-Konto.
  </p>

  <form class="register-card__form" [formGroup]="form" (ngSubmit)="continueToAvatar()">
    <div class="form-field">
      <label class="sr-only" for="register-username">Benutzername</label>
      <div class="form-input-wrapper form-input-wrapper--leading">
        <img class="form-input-icon icon-person" [src]="isUsernameFocused ? 'app-icons/person.svg' : 'app-icons/person-grey.svg'" alt="" aria-hidden="true" />
        <input
          id="register-username"
          class="form-input"
          type="text"
          formControlName="username"
          autocomplete="username"
          placeholder="Benutzername"
          aria-describedby="register-username-error"
          [attr.aria-invalid]="isInvalid('username')"
          (focus)="isUsernameFocused = true"
          (blur)="isUsernameFocused = false"
        />
      </div>
      <p class="form-error" id="register-username-error" aria-live="polite">{{ errorMessage('username') }}</p>
    </div>

    <div class="form-field">
      <label class="sr-only" for="register-email">E-Mail-Adresse</label>
      <div class="form-input-wrapper form-input-wrapper--leading">
        <img class="form-input-icon" [src]="isEmailFocused ? 'app-icons/mail.svg' : 'app-icons/mail-grey.svg'" alt="" aria-hidden="true" />
        <input
          id="register-email"
          class="form-input"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="beispielname&#64;email.com"
          aria-describedby="register-email-error"
          [attr.aria-invalid]="isInvalid('email')"
          (focus)="isEmailFocused = true"
          (blur)="isEmailFocused = false"
        />
      </div>
      <p class="form-error" id="register-email-error" aria-live="polite">{{ errorMessage('email') }}</p>
    </div>

    <div class="form-field">
      <label class="sr-only" for="register-password">Passwort</label>
      <app-password-input
        inputId="register-password"
        formControlName="password"
        placeholder="Passwort"
        autocomplete="new-password"
        [leadingIcon]="isPasswordFocused ? 'app-icons/lock.svg' : 'app-icons/lock-grey.svg'"
        describedBy="register-password-error"
        [isInvalid]="isInvalid('password')"
        (focus)="isPasswordFocused = true"
        (blur)="isPasswordFocused = false"
      />
      <p class="form-error" id="register-password-error" aria-live="polite">{{ errorMessage('password') }}</p>
    </div>

    <div class="form-field">
      <label class="form-checkbox-label" for="register-privacy">
        <input
          id="register-privacy"
          class="form-checkbox"
          type="checkbox"
          formControlName="privacy"
          aria-describedby="register-privacy-error"
          [attr.aria-invalid]="isInvalid('privacy')"
        />
        <span>
          Ich stimme der
          <a routerLink="/datenschutz" (click)="stopEvent($event)">Datenschutzerklärung</a>
          zu.
        </span>
      </label>
      <p class="form-error" id="register-privacy-error" aria-live="polite">{{ errorMessage('privacy') }}</p>
    </div>

    <div class="register-card__actions">
      <button class="btn btn-primary" type="submit" [disabled]="!form.valid">Weiter</button>
    </div>
  </form>
</section>
