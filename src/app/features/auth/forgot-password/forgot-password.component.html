<section class="auth-card auth-card--wide forgot-card">
  <header class="auth-card__head">
    <button class="btn btn-icon" type="button" aria-label="Zurück" (click)="goBack()">
      <img src="icons/arrow-left.svg" alt="" aria-hidden="true" />
    </button>
    <h1 #title class="forgot-card__title" tabindex="-1">Passwort zurücksetzen</h1>
  </header>

  <p class="forgot-card__intro">Bitte geben Sie Ihre E-Mail-Adresse ein.</p>

  <form class="forgot-card__form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-field">
      <label class="sr-only" for="forgot-email">E-Mail-Adresse</label>
      <div class="form-input-wrapper form-input-wrapper--leading">
        <img class="form-input-icon" [src]="isEmailFocused ? 'icons/mail.svg' : 'icons/mail-grey.svg'" alt="" aria-hidden="true" />
        <input
          id="forgot-email"
          class="form-input"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="beispielname&#64;email.com"
          aria-describedby="forgot-email-error"
          [attr.aria-invalid]="isEmailInvalid()"
          (focus)="isEmailFocused = true"
          (blur)="isEmailFocused = false"
        />
      </div>
      <p class="form-error" id="forgot-email-error" aria-live="polite">{{ emailError() }}</p>
    </div>

    <p class="forgot-card__hint">
      Wir senden Ihnen eine E-Mail, über die Sie Ihr Passwort ändern können.
    </p>

    <div class="forgot-card__actions">
      <p class="form-error" role="alert">{{ generalError() }}</p>
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid || isPending()">
        E-Mail senden
      </button>
    </div>
  </form>
</section>
