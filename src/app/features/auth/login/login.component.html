<section class="auth-card login-card">
  <h1 class="login-card__title">Anmeldung</h1>

  <p class="login-card__intro">
    Wir empfehlen dir, die E-Mail-Adresse zu nutzen, die du bei der Arbeit verwendest.
  </p>

  <form class="login-card__form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-field">
      <label class="sr-only" for="login-email">E-Mail-Adresse</label>
      <div class="form-input-wrapper form-input-wrapper--leading">
        <img class="form-input-icon" [src]="isEmailFocused ? 'app-icons/mail.svg' : 'app-icons/mail-grey.svg'" alt="" aria-hidden="true" />
        <input
          id="login-email"
          class="form-input"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="beispielname&#64;email.com"
          aria-describedby="login-email-error"
          [attr.aria-invalid]="isInvalid('email')"
          (focus)="isEmailFocused = true"
          (blur)="isEmailFocused = false"
        />
      </div>
      <p class="form-error" id="login-email-error" aria-live="polite">{{ errorMessage('email') }}</p>
    </div>

    <div class="form-field">
      <label class="sr-only" for="login-password">Passwort</label>
      <app-password-input
        inputId="login-password"
        formControlName="password"
        placeholder="Passwort"
        autocomplete="current-password"
        [leadingIcon]="isPasswordFocused ? 'app-icons/lock.svg' : 'app-icons/lock-grey.svg'"
        describedBy="login-password-error"
        [isInvalid]="isInvalid('password')"
        (focus)="isPasswordFocused = true"
        (blur)="isPasswordFocused = false"
      />
      <p class="form-error" id="login-password-error" aria-live="polite">{{ errorMessage('password') }}</p>
    </div>

    <a class="login-card__forgot" routerLink="/auth/forgot-password">Passwort vergessen?</a>

    <p class="login-card__divider">ODER</p>

    <button
      class="btn login-card__google"
      type="button"
      [disabled]="isPending()"
      (click)="loginWithGoogle()"
    >
      <img class="login-card__google-icon" src="app-icons/google.svg" alt="" aria-hidden="true" />
      Anmelden mit Google
    </button>

    <p class="form-error login-card__general" role="alert">{{ generalError() }}</p>

    <div class="login-card__actions">
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid || isPending()">
        Anmelden
      </button>
      <button class="btn btn-secondary" type="button" [disabled]="isPending()" (click)="loginAsGuest()">
        Gäste-Login
      </button>
    </div>
  </form>
</section>

<app-intro />
