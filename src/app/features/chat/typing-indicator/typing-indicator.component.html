<p class="typing" aria-live="polite">
  @if (typingText(); as text) {
    <span class="typing__text">{{ text }}</span>
    <span class="typing__dots" aria-hidden="true">
      <span class="typing__dot"></span>
      <span class="typing__dot"></span>
      <span class="typing__dot"></span>
    </span>
  }
</p>
