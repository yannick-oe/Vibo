<app-dialog-shell [labelledBy]="titleId" (closed)="close()">
  <div class="palette">
    <h2 [id]="titleId" class="sr-only">Befehlspalette</h2>

    <div class="palette__search">
      <img class="palette__search-icon" src="icons/search.svg" alt="" aria-hidden="true" />
      <label class="sr-only" [for]="inputId">Zu Channel, Direktnachricht oder Aktion springen</label>
      <input
        [id]="inputId"
        class="palette__input"
        type="text"
        role="combobox"
        autocomplete="off"
        aria-autocomplete="list"
        aria-expanded="true"
        [attr.aria-controls]="listboxId"
        [attr.aria-activedescendant]="activeId()"
        placeholder="Suchen oder Aktion ausführen…"
        [value]="query()"
        (input)="onInput($event)"
        (keydown)="onKeydown($event)"
      />
    </div>

    <p class="palette__count" role="status" aria-live="polite">{{ countLabel() }}</p>

    <ul [id]="listboxId" class="palette__list" role="listbox" aria-label="Ergebnisse">
      @for (item of filtered(); track item.id; let i = $index) {
        <li
          [id]="item.id"
          class="palette__option"
          [class.palette__option--active]="i === activeIndex()"
          role="option"
          [attr.aria-selected]="i === activeIndex()"
          (click)="run(item)"
          (mouseenter)="activeIndex.set(i)"
        >
          <span class="palette__option-icon" aria-hidden="true">{{ kindIcon[item.kind] }}</span>
          <span class="palette__option-label">{{ item.label }}</span>
        </li>
      }
    </ul>

    @if (filtered().length === 0) {
      <p class="palette__empty">Keine Treffer</p>
    }
  </div>
</app-dialog-shell>
