<div class="shell">
  <app-topbar />

  <div class="shell__panels">
    <button
      class="shell__menu-toggle"
      type="button"
      aria-controls="shell-workspace"
      [attr.aria-expanded]="isWorkspaceOpen()"
      (click)="toggleWorkspace()"
    >
      <img class="shell__menu-toggle-icon" [src]="toggleIcon()" alt="" aria-hidden="true" />
      <span class="shell__menu-toggle-label">{{ toggleLabel() }}</span>
    </button>

    <aside
      class="shell__workspace"
      id="shell-workspace"
      [class.shell__workspace--closed]="!isWorkspaceOpen()"
    >
      <app-workspace-menu />
    </aside>

    <main class="shell__chat">
      <router-outlet />
    </main>

    <aside class="shell__thread" [class.shell__thread--open]="isThreadOpen()">
      @if (isThreadOpen()) {
        <app-thread-panel />
      }
    </aside>
  </div>

  @if (channelCreate.isOpen()) {
    <app-channel-create-dialog (closed)="channelCreate.close()" />
  }

  @defer (when palette.isOpen()) {
    @if (palette.isOpen()) {
      <app-command-palette />
    }
  }

  @if (profileOverlay.uid(); as uid) {
    <app-profile-dialog [uid]="uid" (closed)="profileOverlay.close()" />
  }
</div>
