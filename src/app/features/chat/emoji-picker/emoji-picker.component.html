<div class="picker" role="dialog" aria-label="Emoji auswählen">
  @if (isReactionTrigger()) {
    <div class="picker__section" role="group" [attr.aria-labelledby]="headingId">
      <h3 class="picker__heading" [id]="headingId">Große Reaktionen</h3>
      <div class="picker__row">
        @for (emoji of bigEmojis; track emoji) {
          <button
            class="picker__emoji picker__emoji--big"
            type="button"
            [attr.aria-label]="labelFor(emoji)"
            [attr.title]="labelFor(emoji)"
            (click)="picked.emit(emoji)"
          >
            <img class="picker__img" [src]="assetFor(emoji)" [alt]="nameFor(emoji)" />
          </button>
        }
      </div>
    </div>
    <hr class="picker__divider" aria-hidden="true" />
  }

  <div class="picker__grid">
    @for (emoji of gridEmojis(); track emoji) {
      <button
        class="picker__emoji"
        type="button"
        [attr.aria-label]="labelFor(emoji)"
        (click)="picked.emit(emoji)"
      >
        <img class="picker__img" [src]="assetFor(emoji)" [alt]="nameFor(emoji)" />
      </button>
    }
  </div>
</div>
