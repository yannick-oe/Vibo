<div class="picker" role="dialog" aria-label="Emoji auswählen">
  @for (emoji of emojis; track emoji) {
    <button
      class="picker__emoji"
      type="button"
      [attr.aria-label]="nameFor(emoji)"
      (click)="picked.emit(emoji)"
    >
      <img class="picker__img" [src]="assetFor(emoji)" [alt]="nameFor(emoji)" />
    </button>
  }
</div>
