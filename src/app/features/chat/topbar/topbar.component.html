<header class="topbar">
  @if (isMobile()) {
    @if (showBack()) {
      <button class="topbar__back" type="button" aria-label="Zurück" (click)="back()">
        <img src="app-icons/arrow-left.svg" alt="" aria-hidden="true" />
      </button>
      <div class="topbar__workspace">
        <img class="topbar__workspace-logo" src="logos/workspace-logo.svg" alt="" aria-hidden="true" />
        <span class="topbar__workspace-name">{{ workspaceName }}</span>
      </div>
    } @else {
      <div class="topbar__workspace">
        <img class="topbar__brand-logo" [src]="wordmarkSrc()" [alt]="appName" width="548" height="254" />
      </div>
    }
    <app-notification-center />
    <button
      class="topbar__user topbar__user--mobile"
      type="button"
      appAvatarActivator
      #userAct="avatarActivator"
      aria-haspopup="menu"
      [attr.aria-expanded]="state() === 'menu'"
      (click)="openMenu($event)"
    >
      <span class="topbar__avatar-wrap">
        <app-avatar
          class="topbar__avatar topbar__avatar--mobile"
          [avatarPath]="avatarPath()"
          surface="topbar"
          [alt]="avatarAlt()"
          [isActive]="userAct.isActive()"
        />
      </span>
    </button>
  } @else {
    <div class="topbar__brand">
      <img class="topbar__logo" [src]="wordmarkSrc()" [alt]="appName" width="548" height="254" />
    </div>

    <app-search-bar (userSelected)="openUserProfile($event)" />

    <div class="topbar__profile">
      <app-notification-center />
      <button
        class="topbar__user"
        type="button"
        appAvatarActivator
        #userAct="avatarActivator"
        aria-haspopup="menu"
        [attr.aria-expanded]="state() === 'menu'"
        (click)="openMenu($event)"
      >
        <span class="topbar__user-name" [title]="userName()">
          <app-aurora-name [name]="userName()" [isAnimated]="userAnimatedName()" />
        </span>
        <span class="topbar__avatar-wrap">
          <app-avatar
            class="topbar__avatar"
            [avatarPath]="avatarPath()"
            surface="topbar"
            [alt]="avatarAlt()"
            [isActive]="userAct.isActive()"
          />
          <span class="topbar__status" aria-hidden="true"></span>
        </span>
        <img class="topbar__chevron" src="app-icons/arrow-down.svg" alt="" aria-hidden="true" />
      </button>
    </div>
  }
</header>

@if (state() === 'menu') {
  <app-dialog-shell [anchor]="menuAnchor()" size="menu" labelledBy="topbar-menu-title" (closed)="close()">
    <div class="topbar__menu">
      <div class="topbar__menu-header">
        <app-avatar class="topbar__menu-avatar" [avatarPath]="avatarPath()" surface="topbar" [alt]="avatarAlt()" />
        <span class="topbar__menu-name" id="topbar-menu-title" [title]="userName()">
          <app-aurora-name [name]="userName()" [isAnimated]="userAnimatedName()" />
        </span>
      </div>
      <div class="topbar__menu-items" role="menu">
        <button class="topbar__menu-item topbar__menu-item--profile" type="button" role="menuitem" (click)="openProfile()">
          <img src="app-icons/account-circle.svg" alt="" aria-hidden="true" />
          Profil
        </button>
        <button
          class="topbar__menu-item topbar__menu-item--theme"
          type="button"
          role="menuitemcheckbox"
          [attr.aria-checked]="isDark()"
          (click)="toggleTheme()"
        >
          @if (isDark()) {
            <svg class="topbar__menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
          } @else {
            <svg class="topbar__menu-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
            </svg>
          }
          {{ themeLabel() }}
        </button>
        <button class="topbar__menu-item topbar__menu-item--logout" type="button" role="menuitem" (click)="logout()">
          <img src="app-icons/logout.svg" alt="" aria-hidden="true" />
          Log out
        </button>
      </div>
      <nav class="topbar__menu-legal" aria-label="Rechtliches">
        <a class="topbar__menu-legal-link" routerLink="/impressum" (click)="close()">Impressum</a>
        <a class="topbar__menu-legal-link" routerLink="/datenschutz" (click)="close()">Datenschutz</a>
      </nav>
    </div>
  </app-dialog-shell>
}

@if (profileUid(); as uid) {
  <app-profile-dialog [uid]="uid" [anchor]="menuAnchor()" (closed)="profileUid.set(null)" />
}
