@for (entry of visibleEntries(); track entry.emoji) {
  <button
    class="chips__chip"
    type="button"
    [class.chips__chip--active]="hasReacted(entry)"
    [attr.aria-label]="reactionLabel(entry)"
    (click)="toggled.emit(entry.emoji)"
  >
    @if (assetFor(entry.emoji); as asset) {
      <img class="chips__emoji" [src]="asset" [alt]="nameFor(entry.emoji)" />
    } @else {
      <span aria-hidden="true">{{ entry.emoji }}</span>
    }
    <span class="chips__count">{{ entry.uids.length }}</span>
    <span class="chips__tooltip" role="tooltip">
      @if (assetFor(entry.emoji); as asset) {
        <img class="chips__tooltip-emoji" [src]="asset" alt="" aria-hidden="true" />
      }
      {{ reactorNames(entry) }}
    </span>
  </button>
}

@if (!isExpanded() && hiddenCount() > 0) {
  <button class="chips__more" type="button" (click)="isExpanded.set(true)">
    +{{ hiddenCount() }} weitere
  </button>
}

@if (isExpanded() && hiddenCount() > 0) {
  <button class="chips__more" type="button" (click)="isExpanded.set(false)">
    Weniger anzeigen
  </button>
}

<button
  class="chips__add"
  type="button"
  aria-label="Reaktion hinzufügen"
  (click)="addRequested.emit(); $event.stopPropagation()"
>
  <img src="icons/add-reaction.svg" alt="" aria-hidden="true" />
</button>
