<app-dialog-shell labelledBy="soundboard-title" size="menu" scrim="transparent" [anchor]="anchor()" (closed)="close()">
  <h2 class="soundboard__title" id="soundboard-title">Soundboard</h2>

  <div class="soundboard__scroll">
    <div class="soundboard__grid">
      @for (preset of presets; track preset.id) {
        <button class="soundboard__sound" type="button" (click)="press(preset)">
          {{ preset.label }}
        </button>
      }
    </div>
  </div>
</app-dialog-shell>
