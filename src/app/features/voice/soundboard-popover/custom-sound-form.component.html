<form class="sound-form" [formGroup]="nameForm" (ngSubmit)="save()">
  <div class="form-field sound-form__file-field">
    <p class="form-hint" id="custom-sound-file-hint">{{ fileHint }}</p>
    <input
      id="custom-sound-file"
      class="sound-form__file"
      type="file"
      [accept]="acceptTypes"
      [disabled]="isChecking() || isPending()"
      aria-describedby="custom-sound-file-hint custom-sound-file-error"
      [attr.aria-invalid]="fileError() !== ''"
      (change)="onFileSelected($event)"
    />
    <label class="btn btn-secondary sound-form__trigger" for="custom-sound-file">
      Datei auswählen
    </label>
    <p class="sound-form__info" [class.sound-form__info--empty]="fileInfo() === ''">
      {{ fileInfo() || noFileNote }}
    </p>
    <p class="form-error" id="custom-sound-file-error">{{ fileError() }}</p>
  </div>

  <div class="form-field">
    <label class="form-label sound-form__label" for="custom-sound-name">Name</label>
    <input
      id="custom-sound-name"
      class="form-input form-input--outlined"
      type="text"
      formControlName="name"
      placeholder="z.B. Airhorn"
      [attr.maxlength]="nameMax"
      aria-describedby="custom-sound-name-error custom-sound-name-counter"
      [attr.aria-invalid]="nameInvalid()"
    />
    <p class="sound-form__counter" id="custom-sound-name-counter">
      {{ nameLength() }}/{{ nameMax }} Zeichen
    </p>
    <p class="form-error" id="custom-sound-name-error">{{ nameError() }}</p>
  </div>

  <div class="sound-form__actions">
    <button class="btn btn-secondary btn-sm" type="button" (click)="cancel()">Abbrechen</button>
    <button class="btn btn-primary btn-sm" type="submit" [disabled]="!canSave()">Speichern</button>
  </div>
</form>
