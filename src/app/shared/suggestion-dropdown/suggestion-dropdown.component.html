<ul class="suggestions" role="listbox">
  @for (suggestion of suggestions(); track suggestion.id; let index = $index) {
    <li>
      <button
        class="suggestions__option"
        type="button"
        role="option"
        [id]="idPrefix() + '-' + index"
        [attr.aria-selected]="index === activeIndex()"
        [class.suggestions__option--active]="index === activeIndex()"
        (click)="picked.emit(suggestion)"
      >
        @if (suggestion.avatar) {
          <span class="suggestions__avatar-wrap">
            <img class="suggestions__avatar" appAvatarFallback [src]="suggestion.avatar" alt="" aria-hidden="true" />
            @if (suggestion.presenceUid; as uid) {
              <app-presence-dot [uid]="uid" />
            }
          </span>
        }
        @if (suggestion.isHash) {
          <img class="suggestions__hash" src="app-icons/tag.svg" alt="" aria-hidden="true" />
        }
        {{ suggestion.label }}
      </button>
    </li>
  }
</ul>
