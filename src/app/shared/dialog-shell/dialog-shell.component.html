<div
  class="dialog-shell"
  [class.dialog-shell--anchored]="anchor() !== null"
  [class.dialog-shell--search]="size() === 'search'"
  (click)="onOverlayClick($event)"
>
  <section
    #card
    class="dialog-shell__card"
    [class.dialog-shell__card--members]="size() === 'members'"
    [class.dialog-shell__card--add-members]="size() === 'add-members'"
    [class.dialog-shell__card--profile]="size() === 'profile'"
    [class.dialog-shell__card--menu]="size() === 'menu'"
    [class.dialog-shell__card--search]="size() === 'search'"
    [class.dialog-shell__card--anchor-left]="hasLeftAnchor()"
    [class.dialog-shell__card--anchor-right]="hasRightAnchor()"
    [class.dialog-shell__card--dragging]="isDragging()"
    [class.dialog-shell__card--settling]="isSettling()"
    [style.top.px]="anchor()?.top ?? null"
    [style.left.px]="anchor()?.left ?? null"
    [style.right.px]="anchor()?.right ?? null"
    [style.maxHeight]="anchoredMaxHeight()"
    [style.transform]="sheetTransform()"
    [style.touchAction]="isDragging() ? 'none' : null"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="labelledBy()"
    [attr.aria-describedby]="describedBy()"
    (keydown.tab)="trapFocus($event)"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (pointercancel)="onPointerCancel()"
  >
    <div class="dialog-shell__grabber" aria-hidden="true"></div>
    <ng-content />
  </section>
</div>
