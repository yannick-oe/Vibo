<div
  class="dialog-shell"
  [class.dialog-shell--anchored]="activeAnchor() !== null"
  [class.dialog-shell--scrim-transparent]="scrim() === 'transparent'"
  [class.dialog-shell--search]="size() === 'search'"
  [class.dialog-shell--dragging]="drag.isDragging()"
  [class.dialog-shell--settling]="drag.isSettling()"
  [style.--sheet-scrim-opacity]="drag.scrimOpacity()"
  [style.--sheet-settle-ms]="drag.settleDurationStyle()"
  (click)="onOverlayClick($event)"
>
  <section
    #card
    class="dialog-shell__card"
    [class.dialog-shell__card--members]="size() === 'members'"
    [class.dialog-shell__card--add-members]="size() === 'add-members'"
    [class.dialog-shell__card--profile]="size() === 'profile'"
    [class.dialog-shell__card--menu]="size() === 'menu'"
    [class.dialog-shell__card--search]="size() === 'search'"
    [class.dialog-shell__card--detents]="detents()"
    [class.dialog-shell__card--detent-pending]="detentPending()"
    [class.dialog-shell__card--detent-entering]="detentEntering()"
    [class.dialog-shell__card--detent-tall]="detentTall()"
    [class.dialog-shell__card--anchor-left]="activeAnchor()?.left !== undefined"
    [class.dialog-shell__card--anchor-right]="activeAnchor()?.right !== undefined"
    [class.dialog-shell__card--anchor-bottom]="activeAnchor()?.bottom !== undefined"
    [class.dialog-shell__card--dragging]="drag.isDragging()"
    [class.dialog-shell__card--settling]="drag.isSettling()"
    [class.dialog-shell__card--dragged]="drag.hasDragged()"
    [style.top.px]="activeAnchor()?.top ?? null"
    [style.bottom.px]="activeAnchor()?.bottom ?? null"
    [style.left.px]="activeAnchor()?.left ?? null"
    [style.right.px]="activeAnchor()?.right ?? null"
    [style.maxHeight]="anchoredMaxHeight()"
    [style.transform]="drag.sheetTransform()"
    [style.--sheet-detent-offset]="drag.detentOffsetStyle()"
    [style.touchAction]="drag.isDragging() ? 'none' : null"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="labelledBy()"
    [attr.aria-describedby]="describedBy()"
    (keydown.tab)="trapFocus($event)"
    (pointerdown)="drag.onPointerDown($event)"
    (pointermove)="drag.onPointerMove($event)"
    (pointerup)="drag.onPointerUp($event)"
    (pointercancel)="drag.onPointerCancel($event)"
  >
    <div class="dialog-shell__grabber" aria-hidden="true"></div>
    <ng-content />
  </section>
</div>
