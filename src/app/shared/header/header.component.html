<header class="header">
  <a class="header__brand" routerLink="/">
    <img class="header__logo" [src]="wordmarkSrc()" [alt]="appName" />
  </a>

  @if (shouldShowCta()) {
    <div class="header__cta">
      <p class="header__cta-text">Neu bei {{ appName }}?</p>
      <a class="header__cta-link" routerLink="/auth/register">Konto erstellen</a>
    </div>
  }
</header>
