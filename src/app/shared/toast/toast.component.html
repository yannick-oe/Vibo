<div class="toast-region" aria-live="polite">
  @if (toast(); as currentToast) {
    <p class="toast">
      @if (currentToast.icon) {
        <img class="toast__icon" [src]="currentToast.icon" alt="" aria-hidden="true" />
      }
      {{ currentToast.message }}
      @if (currentToast.action; as action) {
        <button class="toast__action" type="button" (click)="runAction(action)">
          {{ action.label }}
        </button>
      }
    </p>
  }
</div>
