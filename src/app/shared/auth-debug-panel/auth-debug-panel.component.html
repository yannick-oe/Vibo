@if (diagnostics.visible()) {
  <aside class="debug-panel" aria-label="Auth-Diagnose">
    <header class="debug-panel__head">
      <span class="debug-panel__title">Auth-Diagnose</span>
      <button
        class="debug-panel__close"
        type="button"
        (click)="diagnostics.dismiss()"
        aria-label="Diagnose ausblenden"
      >
        <span aria-hidden="true">×</span>
      </button>
    </header>
    <ol class="debug-panel__list">
      @for (entry of diagnostics.entries(); track $index) {
        <li class="debug-panel__entry">
          <span class="debug-panel__time">{{ entry.at }}</span>
          <span class="debug-panel__source">[{{ entry.source }}]</span>
          {{ entry.detail }}
        </li>
      } @empty {
        <li class="debug-panel__entry">Noch keine Einträge.</li>
      }
    </ol>
  </aside>
}
