<button
  class="receipt"
  type="button"
  [class.receipt--read]="state() === 'read'"
  [disabled]="!hasOthers()"
  [attr.aria-label]="hasOthers() ? buttonLabel() : stateLabel()"
  (click)="open($event)"
>
  @if (state() === 'sending') {
    <svg class="receipt__icon" viewBox="0 0 14 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
      <path d="M1.5 6.5 5 10 12.5 2" />
    </svg>
  } @else {
    <span class="receipt__double" aria-hidden="true">
      <svg class="receipt__check" viewBox="0 0 14 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" focusable="false">
        <path d="M1.5 6.5 5 10 12.5 2" />
      </svg>
      <svg class="receipt__check receipt__check--second" viewBox="0 0 14 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" focusable="false">
        <path d="M1.5 6.5 5 10 12.5 2" />
      </svg>
    </span>
  }
</button>

@if (menuOpen()) {
  <app-dialog-shell size="menu" [anchor]="anchor()" [labelledBy]="titleId" (closed)="close()">
    <div class="receipt__readers">
      <div class="receipt__readers-head">
        <h2 class="receipt__readers-title" [id]="titleId">Gelesen von</h2>
        <button type="button" class="receipt__readers-close" aria-label="Schließen" (click)="close()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true" focusable="false">
            <path d="M3 3 13 13M13 3 3 13" />
          </svg>
        </button>
      </div>
      @for (reader of readers(); track reader.uid) {
        <div class="receipt__reader">
          <span class="receipt__reader-name">{{ reader.name }}</span>
          <span class="receipt__reader-time">{{ reader.time }} Uhr</span>
        </div>
      } @empty {
        <p class="receipt__readers-empty">Noch nicht gelesen</p>
      }
    </div>
  </app-dialog-shell>
}
